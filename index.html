<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Fiber Sculpture</title>
    <!-- AI & GPU Cores -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        canvas { display: block; }
        #start-overlay {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #fff; text-align: center; cursor: pointer;
        }
        .glitch-text { font-size: 14px; letter-spacing: 5px; opacity: 0.6; }
    </style>
</head>
<body>
    <div id="start-overlay" onclick="startApp()">
        <div class="glitch-text">DATA_SCULPTURE_OS // v9.0</div>
        <h1 style="font-size: 24px;">CLICK TO START SENSORS</h1>
        <div class="glitch-text" style="margin-top: 20px;">[ INITIALIZING_CAMERA_PERMISSION ]</div>
    </div>

    <!-- LOAD ORDER IS CRITICAL HERE -->
    <script src="math_utils.js"></script>
    <script src="fluid_solver.js"></script>
    <script src="hand_processor.js"></script>
    <script src="shaders.js"></script>
    <script src="sketch.js"></script>

    <script>
        function startApp() {
            document.getElementById('start-overlay').style.display = 'none';
            if (window.initSculpture) window.initSculpture();
        }
    </script>
</body>
</html>
