<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Handed Interactive Art</title>
    
    <!-- 1. MediaPipe Libraries for AI Tracking -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    
    <!-- 2. p5.js for Visual Rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>

    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #000; 
        }
        /* This ensures the canvas fills the browser window */
        canvas { 
            display: block; 
        }
    </style>
</head>
<body>
    <!-- The p5.js sketch will automatically inject the canvas here -->
    <script src="sketch.js"></script>
</body>
</html>
