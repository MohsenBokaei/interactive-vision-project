<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA_SCULPTURE // AESTHETIC_FLUIDITY</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- External Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <!-- Custom Engine Modules -->
    <script src="math_utils.js"></script>
    <script src="fluid_solver.js"></script>
    <script src="shaders.js"></script>
    <script src="hand_processor.js"></script>
</head>
<body>
    <div id="app-loader">
        <div class="loader-content">
            <h1 class="glitch" data-text="INITIALIZING">INITIALIZING</h1>
            <div class="progress-container"><div id="progress-bar"></div></div>
            <p id="loader-status">LOAD_GPU_KERNELS...</p>
        </div>
    </div>

    <div id="ui-overlay">
        <div class="panel left">
            <div class="stat-group">
                <label>SYSTEM_STATUS</label>
                <span id="sys-status">ACTIVE</span>
            </div>
            <div class="stat-group">
                <label>PARTICLE_COUNT</label>
                <span id="p-count">200,000</span>
            </div>
        </div>
        <div class="panel right">
            <div class="stat-group">
                <label>HAND_L</label>
                <div class="signal-bar"><div id="signal-l"></div></div>
            </div>
            <div class="stat-group">
                <label>HAND_R</label>
                <div class="signal-bar"><div id="signal-r"></div></div>
            </div>
        </div>
    </div>

    <script src="sketch.js"></script>
</body>
</html>
